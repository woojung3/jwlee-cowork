<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="form">
        <!-- OOB Update for Workflow Graph -->
        <div th:replace="~{fragments/workflow :: graph(isOob=true)}"></div>

        <div id="approval-container" class="bg-white p-4 rounded shadow-sm border">
            <!-- 팀별 분석 결과 (5개 항목) -->
            <div th:if="${analyses != null}">
                <h3 class="mb-4 text-dark border-bottom pb-2">Step 1: Team Analysis Review</h3>
                <div th:each="analysis : ${analyses}" class="card mb-4 border-info">
                    <div class="card-header bg-info-subtle fw-bold text-info-emphasis">
                        <span th:text="${analysis.teamName}">Team Name</span> Analysis
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <h6>1. 현재 OKR</h6>
                            <div class="small mb-2 p-2 bg-light border rounded" style="white-space: pre-line;" th:text="${analysis.currentOkr}">OKR</div>
                        </div>
                        <div class="mb-3">
                            <h6>2. 현재 진행중인 이슈 (팀장회의록)</h6>
                            <div class="small mb-2 p-2 bg-light border rounded" style="white-space: pre-line;" th:text="${analysis.currentMeetingIssues}">Meeting Issues</div>
                        </div>
                        <div class="mb-3">
                            <h6>3. 현재 Jira 이슈</h6>
                            <div class="small mb-2 p-2 bg-light border rounded" style="white-space: pre-line;" th:text="${analysis.currentJiraIssues}">Jira Issues</div>
                        </div>
                        <div class="mb-0 bg-secondary-subtle p-3 rounded border border-secondary">
                            <h6 class="text-secondary fw-bold"><i class="bi bi-robot"></i> 4. AI 분석 의견</h6>
                            <p class="small text-dark mb-0" style="white-space: pre-line;" th:text="${analysis.aiOpinion}">AI Opinion</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 최종 보고서 검토 (FINISHED 직전 상태) -->
            <div th:if="${finalReport != null and analyses == null}">
                <h3 class="mb-4 text-dark border-bottom pb-2">Step 2: Final Report Review</h3>
                <div class="card mb-4 border-success">
                    <div class="card-header bg-success-subtle fw-bold text-success-emphasis">
                        Final Draft Preview
                    </div>
                    <div class="card-body preview-content bg-light p-3" style="max-height: 500px; overflow-y: auto;">
                        <div th:utext="${finalReport.noticeHtml}">Notice HTML</div>
                        <div th:utext="${finalReport.requestHtml}">Request HTML</div>
                    </div>
                </div>
            </div>

            <!-- 공통 승인/반려 폼 -->
            <form th:attr="hx-post=@{/feedback/{id}(id=${processId})}" hx-target="#report-result" hx-indicator=".feedback-spinner" class="mt-4 border-top pt-4">
                <div class="mb-3">
                    <label for="comments" class="form-label fw-bold">Feedback / Instructions (Optional if approving)</label>
                    <textarea class="form-control" id="comments" name="comments" rows="3" placeholder="If rejected, please provide specific instructions for the AI..."></textarea>
                </div>
                <div class="d-flex gap-2 justify-content-end align-items-center">
                    <span class="spinner-border spinner-border-sm feedback-spinner" role="status" style="display:none;"></span>
                    <button type="submit" name="approved" value="false" class="btn btn-outline-danger">Reject & Revise</button>
                    <button type="submit" name="approved" value="true" class="btn btn-success px-5 fw-bold">Approve & Continue</button>
                </div>
            </form>
        </div>
    </th:block>
</body>
</html>
