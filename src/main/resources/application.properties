# Changing default LLM
embabel.models.default-llm=gemini-2.5-flash
embabel.models.default-embedding-model=text-embedding-004

# Model Provider Retry Settings (Avoid RPM limits)
embabel.agent.platform.models.googlegenai.backoff-millis=2500
embabel.agent.platform.models.googlegenai.max-attempts=10

embabel.agent.platform.models.gemini.api-key=${GEMINI_API_KEY:your-dev-key}
embabel.agent.platform.models.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai/}

# Presentation Output Configuration
presentation.output.dir=output/slides
presentation.merged.file.path=output/slides/final_presentation.md

embabel.agent.logging.personality=starwars
embabel.agent.rag.lucene.dir=target/lucene-index
embabel.agent.rag.import.dir=knowledge

# MCP Client Configuration - Confluence
spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.stdio.connections.confluence.command=npx
spring.ai.mcp.client.stdio.connections.confluence.args=-y,@aashari/mcp-server-atlassian-confluence
spring.ai.mcp.client.stdio.connections.confluence.env.ATLASSIAN_SITE_NAME=auto-jira
spring.ai.mcp.client.stdio.connections.confluence.env.ATLASSIAN_USER_EMAIL=jwlee@autocrypt.io
spring.ai.mcp.client.stdio.connections.confluence.env.ATLASSIAN_API_TOKEN=${ATLASSIAN_API_TOKEN}
